  messagingSenderId: "256760910640",
  appId: "1:256760910640:web:ab85847d76a7c6e3c32ef5"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  function fmt(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})
      + ' à ' + d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  }

  function renderTile(siteKey, data) {
    const tile  = document.getElementById('tile-' + siteKey);
    const label = document.getElementById('lbl-'  + siteKey);
    const time  = document.getElementById('time-' + siteKey);
    const armed = data && data.status === 'armed';
    tile.setAttribute('data-state', armed ? 'on' : 'off');
    label.textContent = armed ? '✔  ACTIVÉE' : '✘  NON ACTIVÉE';
    time.textContent  = data && data.ts ? 'le ' + fmt(data.ts) : '';
  }

  async function loadAll() {
    try {
      const [s, i] = await Promise.all([
        get(ref(db, 'alarme/siege')),
        get(ref(db, 'alarme/ifp'))
      ]);
      renderTile('siege', s.val());
      renderTile('ifp',   i.val());
      document.getElementById('refreshTime').textContent = fmt(Date.now());
    } catch(e) {
      renderTile('siege', null);
      renderTile('ifp',   null);
    }
  }

  window.addEventListener('load', loadAll);

  window.refresh = async function() {
    const btn = document.getElementById('btnRefresh');
    btn.disabled = true;
    btn.textContent = '...';
    await loadAll();
    btn.textContent = '🔄 Actualiser';
    btn.disabled = false;
  };

        let jawInterval = null;
        let jawPos = 0, jawDir = -1;
        const MAX_OPEN = -400;
        const SPEED = 25;

        function startJaw() {
          if (jawInterval) return;
          jawInterval = setInterval(function() {
            jawPos += jawDir * SPEED;
            if (jawPos <= MAX_OPEN) { jawPos = MAX_OPEN; jawDir = 1; }
            if (jawPos >= 0)        { jawPos = 0;        jawDir = -1; }
            var jaws = document.querySelectorAll('g.jaw');
            for (var i = 0; i < jaws.length; i++) {
              jaws[i].setAttribute('transform', 'translate(0,' + jawPos + ')');
            }
          }, 30);
        }

        function stopJaw() {
          if (jawInterval) { clearInterval(jawInterval); jawInterval = null; }
          jawPos = 0; jawDir = -1;
          var jaws = document.querySelectorAll('g.jaw');
          for (var i = 0; i < jaws.length; i++) {
            jaws[i].setAttribute('transform', 'translate(0,0)');
          }
        }

        audio.addEventListener('ended', stopJaw);
        audio.addEventListener('error', stopJaw);
        startJaw();
        audio.play().catch(function(e) {
          console.log('Audio:', e);
          stopJaw();
        });

<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body { width:100%; height:100%; overflow:hidden; background:#111; font-family:'Mulish',sans-serif; }

  .screen {
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    padding: 18px 14px 14px; gap: 12px;
  }

  .header { flex-shrink:0; text-align:center; }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(13px,3vw,20px);
    font-weight: 800; letter-spacing: 5px;
    text-transform: uppercase; color: #fff;
  }

  .grid { flex:1; display:flex; flex-direction:column; gap:12px; min-height:0; }

  /* ===== TUILE ===== */
  .tile {
    flex: 1; border-radius: 20px; overflow: hidden;
    position: relative; display: flex; flex-direction: column;
    min-height: 0; transition: opacity 0.3s;
    border: 3px solid #333;
  }

  .tile-bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    z-index: 0;
    animation: kenburns 20s ease-in-out infinite alternate;
  }
  @keyframes kenburns {
    from { transform: scale(1);    }
    to   { transform: scale(1.06); }
  }

  #tile-siege .tile-bg { background-image: url('https://images.unsplash.com/photo-1497366216548-37526070297c?w=800&q=80'); }
  #tile-ifp   .tile-bg { background-image: url('https://images.unsplash.com/photo-1580582932707-520aed937b7b?w=800&q=80'); }

  .tile-overlay {
    position: absolute; inset: 0; z-index: 1;
    transition: background 0.5s;
    background: rgba(0,0,0,0.45);
  }
  .tile[data-state="on"]  .tile-overlay { background: rgba(0,160,70,0.62); }
  .tile[data-state="off"] .tile-overlay { background: rgba(190,0,0,0.62);  }
  .tile[data-state="on"]  { border-color: #00c853; }
  .tile[data-state="off"] { border-color: #d50000; }

  /* CONTENU */
  .tile-content {
    position: relative; z-index: 3;
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 16px 12px 8px; gap: 5px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
  }

  .tile-site {
    font-family: 'Syne', sans-serif;
    font-size: clamp(14px,3.5vw,22px);
    font-weight: 800; letter-spacing: 5px;
    text-transform: uppercase; color: #fff;
  }

  .tile-label {
    font-family: 'Syne', sans-serif;
    font-size: clamp(22px,6vw,44px);
    font-weight: 800; letter-spacing: 2px;
    color: #fff; text-align: center; line-height: 1.1;
  }
  .tile[data-state="on"]  .tile-label { color: #ccffdd; }
  .tile[data-state="off"] .tile-label { color: #ffd0d0; }

  .tile-time {
    font-size: clamp(11px,2vw,13px);
    color: rgba(255,255,255,0.5);
    text-align: center; min-height: 15px;
  }

  /* ===== GARDE DE SÉCURITÉ ===== */
  .guard-wrap {
    position: absolute;
    bottom: 52px; left: 0; width: 100%; height: 260px;
    z-index: 3; pointer-events: none; overflow: visible;
  }

  .guard {
    position: absolute; bottom: 0;
    width: 140px; height: 260px;
    animation: patrol 10s linear infinite;
    overflow: visible;
  }
  .guard svg {
    /* bounce supprimé - interfère avec animation mâchoire */
  }

  @keyframes patrol {
    0%   { left: 4%;  transform: scaleX(1);  }
    47%  { left: 82%; transform: scaleX(1);  }
    50%  { left: 82%; transform: scaleX(-1); }
    97%  { left: 4%;  transform: scaleX(-1); }
    100% { left: 4%;  transform: scaleX(1);  }
  }
  /* Rebond South Park */
  @keyframes bounce {
    0%,100% { transform: translateY(0px);   }
    25%      { transform: translateY(-12px); }
    75%      { transform: translateY(-4px);  }
  }

  /* Jambes */
  @keyframes leg-l { 
    0%,100%{transform:rotate(-35deg)} 
    50%{transform:rotate(35deg)} 
  }
  @keyframes leg-r { 
    0%,100%{transform:rotate(35deg)}  
    50%{transform:rotate(-35deg)} 
  }
  @keyframes arm-l { 
    0%,100%{transform:rotate(55deg)}  
    50%{transform:rotate(-55deg)} 
  }
  @keyframes arm-r { 
    0%,100%{transform:rotate(-55deg)} 
    50%{transform:rotate(55deg)}  
  }

  .g-leg-l { transform-origin: 11px 0; animation: leg-l 0.5s ease-in-out infinite; }
  .g-leg-r { transform-origin: 11px 0; animation: leg-r 0.5s ease-in-out infinite; }
  .g-arm-l { transform-origin: 8px 2px; animation: arm-l 0.5s ease-in-out infinite; }
  .g-arm-r { transform-origin: 8px 2px; animation: arm-r 0.5s ease-in-out infinite; }

  /* BOUTONS */
  .tile-actions {
    position: relative; z-index: 4;
    display: flex; flex-shrink: 0;
  }
  .tile-actions button {
    flex: 1;
    padding: clamp(13px,2.8vh,20px) 8px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: clamp(12px,2.2vw,16px);
    font-weight: 800; letter-spacing: 1px;
    text-transform: uppercase; cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .tile-actions button:active { filter: brightness(1.3); }
  .tile-actions button:first-child { border-right: 1px solid rgba(255,255,255,0.1); }

  .btn-activate   { background: rgba(0,0,0,0.45); color: rgba(255,255,255,0.35); }
  .btn-deactivate { background: rgba(0,0,0,0.45); color: rgba(255,255,255,0.35); }

  .tile[data-state="off"] .btn-activate   { background: rgba(0,180,80,0.88);  color: #fff; }
  .tile[data-state="on"]  .btn-deactivate { background: rgba(200,0,0,0.82);   color: #fff; }
  .tile[data-state="on"]  .btn-activate   { background: rgba(0,0,0,0.3); color: rgba(255,255,255,0.3); }
  .tile[data-state="off"] .btn-deactivate { background: rgba(0,0,0,0.3); color: rgba(255,255,255,0.3); }

  /* BARRE BAS */
  .bottom {
    flex-shrink: 0; display: flex;
    align-items: center; justify-content: space-between; gap: 12px;
  }

  #btnRefresh {
    padding: 15px 30px;
    border-radius: 14px;
    border: 2px solid #fff;
    background: #fff; color: #111;
    font-family: 'Syne', sans-serif;
    font-size: clamp(13px,2.5vw,17px);
    font-weight: 800; letter-spacing: 2px;
    text-transform: uppercase; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
    box-shadow: 0 4px 20px rgba(255,255,255,0.15);
  }
  #btnRefresh:hover    { background: #e0e0e0; }
  #btnRefresh:active   { transform: scale(0.97); }
  #btnRefresh:disabled { opacity: 0.4; cursor: not-allowed; }

  .refresh-info { text-align: right; flex: 1; }
  .refresh-info .refresh-label { display:block; font-size:10px; color:#333; text-transform:uppercase; letter-spacing:2px; }
  .refresh-info #refreshTime   { display:block; font-size:clamp(10px,1.8vw,13px); color:#555; letter-spacing:1px; }

   40% { transform: translateY(20px); } 60% { transform: translateY(15px); } }
   50% { transform: translateY(5px); } }

  @keyframes jaw-open {
    0%   { transform: translateY(0px);  }
    50%  { transform: translateY(20px); }
    100% { transform: translateY(0px);  }
  }
  @keyframes jaw-breathe {
    0%   { transform: translateY(0px); }
    50%  { transform: translateY(5px);  }
    100% { transform: translateY(0px); }
  }
  .jaw {
    animation: jaw-breathe 2.5s ease-in-out infinite;
    transform-box: fill-box;
    transform-origin: top center;
  }
  .guard.talking .jaw {
    animation: jaw-open 0.2s ease-in-out infinite !important;
    transform-box: fill-box;
    transform-origin: top center;
  }
</style>
</head>

  <!-- BOUTON DEBUG JAW -->
  <div style="position:fixed; bottom:10px; right:10px; z-index:9999;">
    <button onclick="testJaw()" style="padding:12px; background:red; color:white; font-size:14px; border:none; border-radius:8px; cursor:pointer;">
      TEST BOUCHE
    </button>
    <div id="dbg" style="background:yellow; color:black; font-size:11px; padding:4px; margin-top:4px;"></div>
  </div>
  <script>
  function testJaw() {
    var jaws = document.querySelectorAll('g.jaw');
    var dbg = document.getElementById('dbg');
    dbg.textContent = 'g.jaw trouvés: ' + jaws.length;
    if (jaws.length === 0) {
      // essayer autrement
      jaws = document.querySelectorAll('.jaw');
      dbg.textContent += ' | .jaw: ' + jaws.length;
    }
    var pos = 0, dir = -1, count = 0;
    var iv = setInterval(function() {
      pos += dir * 25;
      if (pos <= -200) { pos = -200; dir = 1; }
      if (pos >= 0)    { pos = 0;    dir = -1; }
      count++;
      for (var i = 0; i < jaws.length; i++) {
        jaws[i].setAttribute('transform', 'translate(0,' + pos + ')');
        jaws[i].style.transform = 'translateY(' + pos + 'px)';
      }
      dbg.textContent = 'tick:' + count + ' pos:' + pos + ' jaws:' + jaws.length;
      if (count > 60) clearInterval(iv);
    }, 30);
  }
  </script>
