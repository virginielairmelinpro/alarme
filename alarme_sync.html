<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alarme</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Mulish:wght@700&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ⚠️ REMPLACEZ CES VALEURS PAR VOTRE CONFIGURATION FIREBASE
  const firebaseConfig = {
    apiKey: "AIzaSyCx0zhCEiZUrD5v0D_o4TdbXhfxB1kszPI",
  authDomain: "activation-alarme-441e8.firebaseapp.com",
  databaseURL: "https://activation-alarme-441e8-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "activation-alarme-441e8",
  storageBucket: "activation-alarme-441e8.firebasestorage.app",
  messagingSenderId: "256760910640",
  appId: "1:256760910640:web:ab85847d76a7c6e3c32ef5"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  function fmt(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})
      + ' à ' + d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  }

  function renderTile(siteKey, data) {
    const tile = document.getElementById('tile-' + siteKey);
    const time = document.getElementById('time-' + siteKey);

    if (!data) {
      tile.setAttribute('data-state', 'unknown');
      time.textContent = '';
      return;
    }

    const armed = data.status === 'armed';
    tile.setAttribute('data-state', armed ? 'on' : 'off');
    time.textContent = fmt(data.ts);
  }

  window.refresh = async function() {
    const btn = document.getElementById('btnRefresh');
    btn.textContent = 'Chargement...';
    btn.disabled = true;
    try {
      const [s, i] = await Promise.all([
        get(ref(db, 'alarme/siege')),
        get(ref(db, 'alarme/ifp'))
      ]);
      renderTile('siege', s.val());
      renderTile('ifp',   i.val());
      document.getElementById('refreshTime').textContent = 'Vérifié le ' + fmt(Date.now());
    } catch(e) { alert('Erreur de connexion.'); }
    btn.textContent = '🔄  Actualiser le statut';
    btn.disabled = false;
  };

  window.setStatus = async function(siteKey, status) {
    const siteLabel = siteKey === 'siege' ? 'Siège' : 'IFP';
    const ts   = Date.now();
    const data = { status, ts, site: siteLabel };
    try {
      await Promise.all([
        set(ref(db, 'alarme/' + siteKey), data),
        push(ref(db, 'alarme/history'), data)
      ]);
      renderTile(siteKey, data);
      document.getElementById('refreshTime').textContent = 'Mis à jour le ' + fmt(ts);
    } catch(e) { alert('Erreur lors de l\'enregistrement.'); }
  };
</script>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Mulish', sans-serif;
    background: #0e0e0e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 14px 40px;
    gap: 16px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #333;
    text-align: center;
  }

  /* GRILLE */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    width: 100%;
    max-width: 520px;
  }
  @media (max-width: 400px) {
    .grid { grid-template-columns: 1fr; }
  }

  /* ============ TUILE ============ */
  .tile {
    border-radius: 22px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border: 3px solid #222;
    background: #161616;
    transition: border-color 0.3s, background 0.3s;
    cursor: default;
  }

  /* ---- ZONE STATUT (grande, dominante) ---- */
  .tile-status {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 12px 20px;
    gap: 10px;
    transition: background 0.3s;
    background: #1a1a1a;
  }

  .tile-emoji {
    font-size: 54px;
    line-height: 1;
  }

  .tile-site {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #444;
  }

  .tile-label {
    font-family: 'Syne', sans-serif;
    font-size: clamp(18px, 5vw, 24px);
    font-weight: 800;
    letter-spacing: 2px;
    text-align: center;
    line-height: 1.1;
    transition: color 0.3s;
    color: #333;
  }

  .tile-time {
    font-size: 11px;
    color: #333;
    transition: color 0.3s;
    text-align: center;
    min-height: 14px;
  }

  /* ---- ZONE BOUTONS (discrète, en bas) ---- */
  .tile-actions {
    display: flex;
    border-top: 2px solid #1e1e1e;
    transition: border-color 0.3s;
  }

  .tile-actions button {
    flex: 1;
    padding: 13px 8px;
    border: none;
    background: transparent;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    color: #333;
    transition: background 0.2s, color 0.2s;
  }

  .tile-actions button:first-child {
    border-right: 2px solid #1e1e1e;
    transition: border-color 0.3s, background 0.2s, color 0.2s;
  }

  .tile-actions button:hover { background: rgba(255,255,255,0.05); color: #fff; }
  .tile-actions button:active { transform: scale(0.97); }

  /* ============ ÉTATS ============ */

  /* ACTIVÉE → vert dominant */
  .tile[data-state="on"] {
    border-color: #00c853;
    background: #00c853;
  }
  .tile[data-state="on"] .tile-status {
    background: #003318;
  }
  .tile[data-state="on"] .tile-label { color: #00e676; font-size: clamp(20px, 5.5vw, 28px); }
  .tile[data-state="on"] .tile-time  { color: #1a5c33; }
  .tile[data-state="on"] .tile-actions { border-top-color: #005724; }
  .tile[data-state="on"] .tile-actions button:first-child { border-right-color: #005724; }
  .tile[data-state="on"] .btn-activate { color: #00e676; }
  .tile[data-state="on"] .btn-deactivate { color: #1a5c33; }

  /* NON ACTIVÉE → rouge dominant */
  .tile[data-state="off"] {
    border-color: #d50000;
    background: #d50000;
  }
  .tile[data-state="off"] .tile-status {
    background: #330000;
  }
  .tile[data-state="off"] .tile-label { color: #ff1744; font-size: clamp(14px, 4vw, 18px); }
  .tile[data-state="off"] .tile-time  { color: #5c1a1a; }
  .tile[data-state="off"] .tile-actions { border-top-color: #5c0000; }
  .tile[data-state="off"] .tile-actions button:first-child { border-right-color: #5c0000; }
  .tile[data-state="off"] .btn-activate   { color: #5c1a1a; }
  .tile[data-state="off"] .btn-deactivate { color: #ff1744; }

  /* INCONNU */
  .tile[data-state="unknown"] .tile-label { color: #333; }

  /* ============ ACTUALISER ============ */
  .refresh-wrap {
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  #btnRefresh {
    width: 100%;
    padding: 15px;
    border-radius: 14px;
    border: 2px solid #222;
    background: #161616;
    color: #444;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  #btnRefresh:hover    { border-color: #448aff; color: #448aff; background: rgba(68,138,255,0.06); }
  #btnRefresh:active   { transform: scale(0.98); }
  #btnRefresh:disabled { opacity: 0.4; cursor: not-allowed; }

  #refreshTime { font-size: 11px; color: #2a2a2a; letter-spacing: 1px; }
</style>
</head>
<body>

<h1>Surveillance Alarme</h1>

<div class="grid">

  <!-- SIÈGE -->
  <div class="tile" id="tile-siege" data-state="unknown">
    <div class="tile-status">
      <div class="tile-emoji">🏢</div>
      <div class="tile-site">Siège</div>
      <div class="tile-label" id="lbl-siege">?</div>
      <div class="tile-time"  id="time-siege"></div>
    </div>
    <div class="tile-actions">
      <button class="btn-activate"   onclick="setStatus('siege','armed')">✔ Activée</button>
      <button class="btn-deactivate" onclick="setStatus('siege','disarmed')">✘ Non activée</button>
    </div>
  </div>

  <!-- IFP -->
  <div class="tile" id="tile-ifp" data-state="unknown">
    <div class="tile-status">
      <div class="tile-emoji">🏫</div>
      <div class="tile-site">IFP</div>
      <div class="tile-label" id="lbl-ifp">?</div>
      <div class="tile-time"  id="time-ifp"></div>
    </div>
    <div class="tile-actions">
      <button class="btn-activate"   onclick="setStatus('ifp','armed')">✔ Activée</button>
      <button class="btn-deactivate" onclick="setStatus('ifp','disarmed')">✘ Non activée</button>
    </div>
  </div>

</div>

<div class="refresh-wrap">
  <button id="btnRefresh" onclick="refresh()">🔄  Actualiser le statut</button>
  <span id="refreshTime"></span>
</div>

<script>
  // Mettre à jour le texte du label selon l'état
  const observer = new MutationObserver(() => {
    ['siege','ifp'].forEach(k => {
      const tile  = document.getElementById('tile-' + k);
      const label = document.getElementById('lbl-'  + k);
      const state = tile.getAttribute('data-state');
      if (state === 'on')      label.textContent = 'ACTIVÉE';
      else if (state === 'off') label.textContent = 'NON ACTIVÉE';
      else                      label.textContent = '?';
    });
  });
  ['siege','ifp'].forEach(k =>
    observer.observe(document.getElementById('tile-' + k), { attributes: true })
  );
</script>

</body>
</html>
