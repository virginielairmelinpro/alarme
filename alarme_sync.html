<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Alarme</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Mulish:wght@600;700&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ⚠️ REMPLACEZ CES VALEURS PAR VOTRE CONFIGURATION FIREBASE
  const firebaseConfig = {
   apiKey: "AIzaSyCx0zhCEiZUrD5v0D_o4TdbXhfxB1kszPI",
  authDomain: "activation-alarme-441e8.firebaseapp.com",
  databaseURL: "https://activation-alarme-441e8-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "activation-alarme-441e8",
  storageBucket: "activation-alarme-441e8.firebasestorage.app",
  messagingSenderId: "256760910640",
  appId: "1:256760910640:web:ab85847d76a7c6e3c32ef5"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  function fmt(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})
      + ' à ' + d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  }

  function renderTile(siteKey, data) {
    const tile  = document.getElementById('tile-' + siteKey);
    const label = document.getElementById('lbl-'  + siteKey);
    const time  = document.getElementById('time-' + siteKey);
    const armed = data && data.status === 'armed';
    tile.setAttribute('data-state', armed ? 'on' : 'off');
    label.textContent = armed ? '✔  ACTIVÉE' : '✘  NON ACTIVÉE';
    time.textContent  = data && data.ts ? 'le ' + fmt(data.ts) : '';
  }

  async function loadAll() {
    try {
      const [s, i] = await Promise.all([
        get(ref(db, 'alarme/siege')),
        get(ref(db, 'alarme/ifp'))
      ]);
      renderTile('siege', s.val());
      renderTile('ifp',   i.val());
      document.getElementById('refreshTime').textContent = fmt(Date.now());
    } catch(e) {
      renderTile('siege', null);
      renderTile('ifp',   null);
    }
  }

  window.addEventListener('load', loadAll);

  window.refresh = async function() {
    const btn = document.getElementById('btnRefresh');
    btn.disabled = true;
    btn.textContent = '...';
    await loadAll();
    btn.textContent = '🔄 Actualiser';
    btn.disabled = false;
  };

  window.setStatus = async function(siteKey, status) {
    const siteLabel = siteKey === 'siege' ? 'Siège' : 'IFP';
    const ts   = Date.now();
    const data = { status, ts, site: siteLabel };
    const tile = document.getElementById('tile-' + siteKey);
    tile.style.opacity = '0.6';
    try {
      await Promise.all([
        set(ref(db, 'alarme/' + siteKey), data),
        push(ref(db, 'alarme/history'), data)
      ]);
      renderTile(siteKey, data);
      document.getElementById('refreshTime').textContent = fmt(ts);
    } catch(e) { alert('Erreur lors de l\'enregistrement.'); }
    tile.style.opacity = '1';
  };
</script>

<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #111;
    font-family: 'Mulish', sans-serif;
  }

  .screen {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 20px 16px 16px;
    gap: 14px;
  }

  /* HEADER */
  .header {
    flex-shrink: 0;
    text-align: center;
  }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(14px, 3vw, 20px);
    font-weight: 800;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #fff;
  }

  /* TUILES — empilées en portrait */
  .grid {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-height: 0;
  }

  /* ===== TUILE ===== */
  .tile {
    flex: 1;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    min-height: 0;
    transition: opacity 0.3s;
  }

  /* PHOTO DE FOND */
  .tile-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    transition: filter 0.4s;
    z-index: 0;
  }

  /* Photos génériques via Unsplash */
  #tile-siege  .tile-bg { background-image: url('https://images.unsplash.com/photo-1497366216548-37526070297c?w=800&q=80'); }
  #tile-ifp    .tile-bg { background-image: url('https://images.unsplash.com/photo-1580582932707-520aed937b7b?w=800&q=80'); }

  /* Overlay coloré selon statut */
  .tile-overlay {
    position: absolute;
    inset: 0;
    z-index: 1;
    transition: background 0.4s;
    background: rgba(0,0,0,0.45);
  }

  .tile[data-state="on"]  .tile-overlay { background: rgba(0, 180, 80, 0.60); }
  .tile[data-state="off"] .tile-overlay { background: rgba(200, 0, 0,  0.62); }

  /* CONTENU PAR-DESSUS */
  .tile-content {
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 16px 10px;
    gap: 6px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.7);
  }

  .tile-site {
    font-family: 'Syne', sans-serif;
    font-size: clamp(15px, 3.5vw, 22px);
    font-weight: 800;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #fff;
  }

  .tile-label {
    font-family: 'Syne', sans-serif;
    font-size: clamp(22px, 6vw, 42px);
    font-weight: 800;
    letter-spacing: 2px;
    color: #fff;
    text-align: center;
    line-height: 1.1;
    transition: color 0.3s;
  }

  .tile[data-state="on"]  .tile-label { color: #ccffdd; }
  .tile[data-state="off"] .tile-label { color: #ffd0d0; }

  .tile-time {
    font-size: clamp(11px, 2vw, 14px);
    color: rgba(255,255,255,0.55);
    text-align: center;
    min-height: 16px;
  }

  /* BOUTONS EN BAS DE LA TUILE */
  .tile-actions {
    position: relative;
    z-index: 2;
    display: flex;
    flex-shrink: 0;
  }

  .tile-actions button {
    flex: 1;
    padding: clamp(14px, 3vh, 22px) 8px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: clamp(12px, 2.2vw, 16px);
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .tile-actions button:active { filter: brightness(1.3); }

  /* Bouton ACTIVER */
  .btn-activate {
    background: rgba(0,0,0,0.45);
    color: rgba(255,255,255,0.4);
    border-right: 1px solid rgba(255,255,255,0.1);
  }
  .tile[data-state="off"] .btn-activate {
    background: rgba(0,180,80,0.85);
    color: #fff;
  }
  .tile[data-state="on"] .btn-activate {
    background: rgba(0,0,0,0.3);
    color: rgba(255,255,255,0.35);
  }

  /* Bouton DÉSACTIVER */
  .btn-deactivate {
    background: rgba(0,0,0,0.45);
    color: rgba(255,255,255,0.4);
  }
  .tile[data-state="on"] .btn-deactivate {
    background: rgba(200,0,0,0.80);
    color: #fff;
  }
  .tile[data-state="off"] .btn-deactivate {
    background: rgba(0,0,0,0.3);
    color: rgba(255,255,255,0.35);
  }

  /* ===== BARRE DU BAS ===== */
  .bottom {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  #btnRefresh {
    padding: 14px 28px;
    border-radius: 14px;
    border: 2px solid #333;
    background: #1e1e1e;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: clamp(13px, 2.2vw, 16px);
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  #btnRefresh:hover    { border-color: #fff; background: #2a2a2a; }
  #btnRefresh:active   { transform: scale(0.97); }
  #btnRefresh:disabled { opacity: 0.4; cursor: not-allowed; }

  .refresh-info {
    text-align: right;
    flex: 1;
  }
  .refresh-info span {
    display: block;
    font-size: clamp(10px, 1.8vw, 13px);
    color: #444;
    letter-spacing: 1px;
  }
  .refresh-info .refresh-label { color: #333; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; }
</style>
</head>
<body>
<div class="screen">

  <div class="header">
    <h1>Surveillance Alarme</h1>
  </div>

  <div class="grid">

    <!-- SIÈGE -->
    <div class="tile" id="tile-siege" data-state="off">
      <div class="tile-bg"></div>
      <div class="tile-overlay"></div>
      <div class="tile-content">
        <div class="tile-site">Siège</div>
        <div class="tile-label" id="lbl-siege">✘  NON ACTIVÉE</div>
        <div class="tile-time"  id="time-siege"></div>
      </div>
      <div class="tile-actions">
        <button class="btn-activate"   onclick="setStatus('siege','armed')">✔ Activer</button>
        <button class="btn-deactivate" onclick="setStatus('siege','disarmed')">✘ Désactiver</button>
      </div>
    </div>

    <!-- IFP -->
    <div class="tile" id="tile-ifp" data-state="off">
      <div class="tile-bg"></div>
      <div class="tile-overlay"></div>
      <div class="tile-content">
        <div class="tile-site">IFP</div>
        <div class="tile-label" id="lbl-ifp">✘  NON ACTIVÉE</div>
        <div class="tile-time"  id="time-ifp"></div>
      </div>
      <div class="tile-actions">
        <button class="btn-activate"   onclick="setStatus('ifp','armed')">✔ Activer</button>
        <button class="btn-deactivate" onclick="setStatus('ifp','disarmed')">✘ Désactiver</button>
      </div>
    </div>

  </div>

  <!-- BARRE BAS -->
  <div class="bottom">
    <button id="btnRefresh" onclick="refresh()">🔄 Actualiser</button>
    <div class="refresh-info">
      <span class="refresh-label">Dernière vérif.</span>
      <span id="refreshTime">—</span>
    </div>
  </div>

</div>
</body>
</html>
